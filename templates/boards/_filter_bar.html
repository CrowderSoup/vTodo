<div style="display: flex; align-items: center; gap: .5rem; flex-wrap: wrap; margin-bottom: 1rem;">
  <select id="saved-filter-select"
          onchange="if(this.value) htmx.ajax('POST', this.value, {target:'#board-content', swap:'innerHTML'})"
          style="padding: .3rem .5rem; font-size: .875rem; border: 1px solid var(--border); border-radius: .375rem; background: var(--input-bg); color: var(--text); cursor: pointer; width: fit-content;">
    <option value="">Saved filters…</option>
    {% for sf in saved_filters %}
    <option value="{% url 'boards:filter-load' sf.pk %}"
            {% if sf.name == active_saved_filter_name %}selected{% endif %}>
      {{ sf.name }}
    </option>
    {% endfor %}
  </select>
  <form id="board-filter-form"
        hx-post="{% url 'boards:board-filter' %}"
        hx-target="#board-content"
        hx-swap="innerHTML"
        hx-trigger="change"
        style="display: contents;">
    <select id="board-filter-due" name="due"
            style="padding: .3rem .5rem; font-size: .875rem; border: 1px solid var(--border); border-radius: .375rem; background: var(--input-bg); color: var(--text); cursor: pointer; width: fit-content;">
      <option value="">Any date</option>
      <option value="overdue" {% if active_filter.due == "overdue" %}selected{% endif %}>Overdue</option>
      <option value="today" {% if active_filter.due == "today" %}selected{% endif %}>Due today</option>
      <option value="this_week" {% if active_filter.due == "this_week" %}selected{% endif %}>Due this week</option>
    </select>
    {% for tag in active_filter.tags %}
    <label style="display: inline-flex; align-items: center; gap: .25rem; font-size: .75rem; padding: .15rem .5rem;
                  background: var(--text); color: var(--bg);
                  border: 1px solid var(--text); border-radius: 9999px; cursor: pointer; user-select: none;">
      <input type="checkbox" name="tags" value="{{ tag }}" checked style="display: none;">
      {{ tag }} ×
    </label>
    {% endfor %}
    {% for col in active_filter.hidden_columns %}
    <label style="display: inline-flex; align-items: center; gap: .25rem; font-size: .75rem; padding: .15rem .5rem;
                  background: var(--badge-bg); color: var(--text);
                  border: 1px solid var(--border); border-radius: 9999px; cursor: pointer; user-select: none;">
      <input type="checkbox" name="hidden_columns" value="{{ col.pk }}" checked style="display: none;">
      Hidden: {{ col.label }} ×
    </label>
    {% endfor %}
  </form>
  {% if active_filter.tags or active_filter.due or active_filter.hidden_columns %}
  <div class="save-filter-container" style="position: relative; display: inline-block;">
    <button onclick="this.nextElementSibling.classList.toggle('open')"
            style="font-size: .8rem; color: var(--muted); padding: .3rem .5rem; background: none; border: none;">
      Save filter
    </button>
    <div class="save-filter-popover">
      <form hx-post="{% url 'boards:filter-save' %}"
            hx-target="#board-content"
            hx-swap="innerHTML"
            hx-include="#board-filter-form"
            style="display: flex; gap: .25rem;">
        {% csrf_token %}
        <input type="text" name="name" placeholder="Filter name…"
               style="padding: .3rem .5rem; font-size: .875rem; flex: 1; min-width: 0;">
        <button type="submit" style="font-size: .875rem; white-space: nowrap;">Save</button>
      </form>
    </div>
  </div>
  <form hx-post="{% url 'boards:board-filter' %}"
        hx-target="#board-content"
        hx-swap="innerHTML"
        style="display: contents;">
    <button type="submit"
            style="font-size: .8rem; color: var(--muted); padding: .3rem .5rem;">× Clear</button>
  </form>
  {% endif %}
</div>

{% extends "base.html" %}

{% block body_class %}page-board{% endblock %}
{% block title %}Board — vtodo{% endblock %}

{% block content %}
<section class="page-shell">
  <section class="surface-panel board-controls">
    <div id="board-filter">{% include "boards/_filter_bar.html" %}</div>
  </section>

  <div id="board-content" class="board-columns">
    {% include "boards/_columns.html" %}
  </div>

  <button class="board-fab"
          type="button"
          title="Add task"
          aria-label="Add task"
          hx-get="{% url 'boards:task-panel-create' %}"
          hx-target="#task-panel-content"
          hx-swap="innerHTML"
          hx-on::after-request="openTaskPanel()">
    <span class="board-fab-mark">+</span>
    <span class="board-fab-label">New task</span>
  </button>
</section>
{% endblock %}

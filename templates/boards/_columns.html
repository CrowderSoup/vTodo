{% for column, tasks, default_status in columns_with_tasks %}
<div class="board-column" data-column-id="{{ column.pk }}">
  <div class="column-header">
    <span class="col-drag-handle" draggable="true" data-column-id="{{ column.pk }}" title="Drag to reorder">⠿</span>
    <strong>{{ column.label }}</strong>
    <span class="column-badge">{{ tasks|length }}</span>
    <div class="column-actions">
      <button class="col-actions-btn" title="Column actions" onclick="this.nextElementSibling.classList.toggle('open')">⋯</button>
      <div class="col-actions-menu">
        <button hx-post="{% url 'boards:column-hide' column.pk %}"
                hx-target="#board-content"
                hx-swap="innerHTML"
                onclick="this.closest('.col-actions-menu').classList.remove('open')">
          Hide column
        </button>
        <button hx-post="{% url 'boards:column-archive' column.pk %}"
                hx-target="#board-content"
                hx-swap="innerHTML"
                hx-confirm="Archive all {{ tasks|length }} card{% if tasks|length != 1 %}s{% endif %} in &ldquo;{{ column.label }}&rdquo;?"
                onclick="this.closest('.col-actions-menu').classList.remove('open')">
          Archive all cards
        </button>
      </div>
    </div>
  </div>

  <form class="add-task-form"
        hx-post="{% url 'boards:task-create' %}"
        hx-target="#col-tasks-{{ column.pk }}"
        hx-swap="beforeend"
        hx-on::after-request="this.reset()">
    {% csrf_token %}
    <input type="hidden" name="status" value="{{ default_status }}">
    <input type="text" name="title" placeholder="Add a task…">
    <button type="submit" title="Add task">+</button>
  </form>

  <div class="task-list" id="col-tasks-{{ column.pk }}" data-default-status="{{ default_status }}">
    {% for task in tasks %}
    {% include "partials/task_card.html" %}
    {% endfor %}
  </div>
</div>
{% endfor %}

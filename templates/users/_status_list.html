{% for status in statuses %}
<div class="config-row">
  <div class="config-main">
    <div class="config-title">
      <span>{{ status.name }}</span>
      <code>{{ status.slug }}</code>
      {% if status.is_done %}<span class="badge badge--done">done</span>{% endif %}
    </div>
  </div>
  <button class="btn-danger btn-icon"
          hx-post="{% url 'users:status-delete' status.pk %}"
          hx-target="#status-list"
          hx-swap="innerHTML"
          hx-confirm="Delete status &ldquo;{{ status.name|escapejs }}&rdquo;? Tasks with this status will be unaffected.">×</button>
</div>
{% empty %}
<div class="surface-card" style="padding: 1rem 1.1rem;">
  <p class="field-help">No statuses yet. Add the workflow steps you want cards to move through.</p>
</div>
{% endfor %}

{% if api_token %}
<div class="token-shell">
  <code class="token-value">{{ api_token }}</code>
  <form method="post" action="{% url 'users:api-token-regenerate' %}">
    {% csrf_token %}
    <button type="submit" class="btn-secondary">Regenerate</button>
  </form>
</div>
<p class="token-hint">
  Send it as <code>Authorization: Token {{ api_token }}</code>
</p>
{% endif %}

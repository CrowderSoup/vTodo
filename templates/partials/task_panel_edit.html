<div class="task-panel-header">
  <h2 style="font-size: 1rem; color: var(--muted);">Edit task</h2>
  <button class="task-panel-close" onclick="closeTaskPanel()" title="Close">×</button>
</div>
<div class="task-panel-body">
  <form id="task-panel-form"
        hx-post="{% url 'boards:task-panel-update' task.pk %}"
        hx-target="#task-panel-content"
        hx-swap="innerHTML">
    {% csrf_token %}
    <div style="margin-bottom: .75rem;">
      <label style="font-size: .75rem; color: var(--muted); display: block; margin-bottom: .2rem;">Title</label>
      <input type="text" name="title" value="{{ task.title }}" required autofocus
             style="width: 100%; padding: .375rem .5rem; border: 1px solid var(--border); border-radius: .375rem; background: var(--bg); color: var(--text); font-size: .9rem; font-weight: 500;">
    </div>
    <div style="margin-bottom: .75rem;">
      <label style="font-size: .75rem; color: var(--muted); display: block; margin-bottom: .2rem;">Notes</label>
      <textarea id="task-notes-editor" name="notes">{{ task.notes }}</textarea>
    </div>
    <div style="margin-bottom: .75rem;">
      <label style="font-size: .75rem; color: var(--muted); display: block; margin-bottom: .2rem;">Due date</label>
      <input type="date" name="due_date" value="{{ task.due_date|date:'Y-m-d' }}"
             style="padding: .375rem .5rem; border: 1px solid var(--border); border-radius: .375rem; background: var(--bg); color: var(--text); font-size: .875rem;">
    </div>
    <div style="margin-bottom: .75rem;">
      <label style="font-size: .75rem; color: var(--muted); display: block; margin-bottom: .2rem;">Tags (comma-separated)</label>
      <input type="text" name="tags" value="{{ task.tags|join:', ' }}"
             placeholder="work, urgent, design"
             style="width: 100%; padding: .375rem .5rem; border: 1px solid var(--border); border-radius: .375rem; background: var(--bg); color: var(--text); font-size: .875rem;">
    </div>
    <div style="margin-bottom: .75rem;">
      <label style="font-size: .75rem; color: var(--muted); display: block; margin-bottom: .2rem;">Recurrence (days)</label>
      <div style="display: flex; gap: .5rem; align-items: center;">
        <input type="number" name="recurrence_days" value="{{ task.recurrence_days|default:'' }}" min="1" placeholder="e.g. 7"
               style="width: 6rem; padding: .375rem .5rem; border: 1px solid var(--border); border-radius: .375rem; background: var(--bg); color: var(--text); font-size: .875rem;">
        <select name="recurrence_from"
                style="padding: .375rem .5rem; border: 1px solid var(--border); border-radius: .375rem; background: var(--bg); color: var(--text); font-size: .875rem;">
          <option value="completion" {% if task.recurrence_from == "completion" %}selected{% endif %}>after completion</option>
          <option value="due_date" {% if task.recurrence_from == "due_date" %}selected{% endif %}>after due date</option>
        </select>
      </div>
    </div>
  </form>
</div>
<div class="task-panel-footer">
  <button type="button"
          hx-get="{% url 'boards:task-panel' task.pk %}"
          hx-target="#task-panel-content"
          hx-swap="innerHTML"
          style="font-size: .8rem;">Cancel</button>
  <button type="submit" form="task-panel-form" style="font-size: .8rem;">Save</button>
</div>

<div class="task-panel-header">
  <div class="task-panel-header-copy">
    <span class="eyebrow">Editing task #{{ task.pk }}</span>
    <h2 class="task-panel-title">{{ task.title }}</h2>
    <div class="task-panel-subtitle">Tighten the details without leaving the board.</div>
  </div>
  <button class="task-panel-close btn-ghost" type="button" onclick="closeTaskPanel()" title="Close">×</button>
</div>

<div class="task-panel-body">
  <form id="task-panel-form"
        class="panel-form"
        hx-post="{% url 'boards:task-panel-update' task.pk %}"
        hx-target="#task-panel-content"
        hx-swap="innerHTML">
    {% csrf_token %}

    <div class="form-field">
      <label class="field-label" for="task-panel-title-input">Title</label>
      <input id="task-panel-title-input" type="text" name="title" value="{{ task.title }}" required autofocus>
    </div>

    <div class="form-field">
      <label class="field-label" for="task-notes-editor">Notes</label>
      <textarea id="task-notes-editor" name="notes">{{ task.notes }}</textarea>
    </div>

    <div class="form-grid form-grid--two">
      <div class="form-field">
        <label class="field-label" for="task-panel-due">Due date</label>
        <input id="task-panel-due" type="date" name="due_date" value="{{ task.due_date|date:'Y-m-d' }}">
      </div>

      <div class="form-field">
        <label class="field-label" for="task-panel-tags">Tags</label>
        <input id="task-panel-tags" type="text" name="tags" value="{{ task.tags|join:', ' }}" placeholder="work, urgent, design">
      </div>
    </div>

    <div class="form-grid form-grid--two">
      <div class="form-field">
        <label class="field-label" for="task-panel-recurrence-days">Repeat every</label>
        <input id="task-panel-recurrence-days" type="number" name="recurrence_days" value="{{ task.recurrence_days|default:'' }}" min="1" placeholder="e.g. 7">
      </div>

      <div class="form-field">
        <label class="field-label" for="task-panel-recurrence-from">Repeat from</label>
        <select id="task-panel-recurrence-from" name="recurrence_from">
          <option value="completion" {% if task.recurrence_from == "completion" %}selected{% endif %}>Completion date</option>
          <option value="due_date" {% if task.recurrence_from == "due_date" %}selected{% endif %}>Due date</option>
        </select>
      </div>
    </div>
  </form>
</div>

<div class="task-panel-footer">
  <div class="panel-footer-actions">
    <button type="button"
            class="btn-ghost"
            hx-get="{% url 'boards:task-panel' task.pk %}"
            hx-target="#task-panel-content"
            hx-swap="innerHTML">Cancel</button>
  </div>

  <div class="panel-footer-secondary">
    <button type="submit" class="btn-primary" form="task-panel-form">Save changes</button>
  </div>
</div>

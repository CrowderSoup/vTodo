{% if comments %}
<div class="comment-list">
  {% for entry in comments %}
  <div class="surface-card comment-card">
    <div class="comment-meta">
      <span>{{ entry.comment.created_at|date:"N j, Y g:i a" }}</span>
      <button class="btn-ghost btn-small"
              hx-post="{% url 'boards:task-comment-delete' task.pk entry.comment.pk %}"
              hx-target="#task-comments"
              hx-swap="innerHTML"
              hx-confirm="Delete this comment?">Delete</button>
    </div>
    <div class="task-panel-notes">{{ entry.body_html|safe }}</div>
  </div>
  {% endfor %}
</div>
{% else %}
<div class="surface-card" style="padding: 1rem 1.1rem;">
  <p class="field-help">No comments yet. Use comments for updates that should stay attached to the task.</p>
</div>
{% endif %}

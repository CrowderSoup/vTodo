name: Deploy

on:
  push:
    branches: [main]

env:
  SSH_PRIVATE_KEY: ${{ secrets.CROWDER_CLOUD_SSH_KEY }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - run: gem install kamal -v '~> 2'

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/crowder-cloud
          chmod 600 ~/.ssh/crowder-cloud

      - name: Write kamal secrets
        run: |
          cat > .kamal/secrets <<'EOF'
          KAMAL_REGISTRY_PASSWORD=$KAMAL_REGISTRY_PASSWORD
          SECRET_KEY=$SECRET_KEY
          DATABASE_URL=$DATABASE_URL
          CELERY_BROKER_URL=$CELERY_BROKER_URL
          EMAIL_HOST_PASSWORD=$EMAIL_HOST_PASSWORD
          VTODO_API_TOKEN=$VTODO_API_TOKEN
          VTODO_MCP_TOKEN=$VTODO_MCP_TOKEN
          GOOGLE_CLIENT_ID=$GOOGLE_CLIENT_ID
          GOOGLE_CLIENT_SECRET=$GOOGLE_CLIENT_SECRET
          INTEGRATIONS_ENCRYPTION_KEY=$INTEGRATIONS_ENCRYPTION_KEY
          EOF

      - name: Deploy
        run: kamal deploy
        env:
          KAMAL_REGISTRY_PASSWORD: ${{ secrets.KAMAL_REGISTRY_PASSWORD }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          CELERY_BROKER_URL: ${{ secrets.CELERY_BROKER_URL }}
          EMAIL_HOST_PASSWORD: ${{ secrets.EMAIL_HOST_PASSWORD }}
          VTODO_API_TOKEN: ${{ secrets.VTODO_API_TOKEN }}
          VTODO_MCP_TOKEN: ${{ secrets.VTODO_MCP_TOKEN }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          INTEGRATIONS_ENCRYPTION_KEY: ${{ secrets.INTEGRATIONS_ENCRYPTION_KEY }}
